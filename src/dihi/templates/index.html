<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIHI Media Library</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #272727;
  --border: #333;
  --text: #f1f1f1;
  --muted: #aaa;
  --accent: #3ea6ff;
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
#search {
  flex: 1; min-width: 160px; max-width: 460px;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 7px 14px; border-radius: 20px; font-size: 0.9rem; outline: none;
}
#search:focus { border-color: var(--accent); }
.hcontrols { display: flex; gap: 8px; align-items: center; margin-left: auto; }
select {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 10px; border-radius: 6px; font-size: 0.82rem; cursor: pointer; outline: none;
}
.hbtn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 10px; border-radius: 6px; font-size: 0.82rem; cursor: pointer;
  white-space: nowrap;
}
.hbtn:hover { border-color: var(--accent); }
.hbtn.active { background: var(--accent); border-color: var(--accent); color: #000; }
#count { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }

/* ── Player ── */
#player-wrap {
  background: var(--surface); border-bottom: 2px solid var(--accent);
  padding: 20px 24px; display: none;
}
#player-wrap.visible { display: block; }
.player-inner {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
  gap: 20px; max-width: 1400px; margin: 0 auto;
}
.player-media { display: flex; flex-direction: column; gap: 0; }
#vpanel, #apanel { width: 100%; }
#vpanel {
  aspect-ratio: 16/9; max-height: 62vh;
  background: #000; border-radius: var(--radius); display: block; object-fit: contain;
  cursor: pointer;
}
#apanel { border-radius: var(--radius); margin-top: 10px; accent-color: var(--accent); }
.player-info { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
#p-title { font-size: 1.1rem; font-weight: 600; line-height: 1.45; }
.p-meta { font-size: 0.82rem; color: var(--muted); line-height: 1.8; }
.p-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 4px; }
.btn {
  padding: 7px 15px; border-radius: 20px; border: none; cursor: pointer;
  font-size: 0.82rem; font-weight: 500; white-space: nowrap;
  transition: opacity .15s;
}
.btn:hover { opacity: .75; }
.btn-primary { background: var(--accent); color: #000; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-close { background: transparent; color: var(--muted); border: 1px solid var(--border); margin-left: auto; }
.vlc-hint {
  margin-top: auto; font-size: 0.75rem; color: var(--muted);
  background: var(--surface2); border-radius: 6px; padding: 8px 10px; line-height: 1.5;
  word-break: break-all;
}
.vlc-hint code { color: var(--accent); }
.asset-details {
  display: grid; gap: 10px; min-width: 0;
  font-size: 0.78rem;
}
.asset-details details {
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); overflow: hidden;
}
.asset-details summary {
  cursor: pointer; padding: 8px 10px; color: var(--text);
  font-weight: 600; list-style-position: inside;
}
.file-list, .meta-list {
  display: grid; gap: 1px; max-height: 260px; overflow: auto;
  border-top: 1px solid var(--border);
}
.file-row, .meta-row {
  display: grid; gap: 8px; align-items: center;
  padding: 7px 10px; background: var(--surface);
}
.file-row {
  grid-template-columns: minmax(80px, .45fr) minmax(0, 1fr) auto;
}
.file-kind, .file-size, .meta-key { color: var(--muted); font-size: 0.72rem; }
.file-name, .meta-val { min-width: 0; overflow-wrap: anywhere; }
.file-name a { color: var(--accent); text-decoration: none; }
.file-name a:hover { text-decoration: underline; }
.meta-row { grid-template-columns: minmax(100px, .35fr) minmax(0, 1fr); }
.metadata-json {
  margin: 0; padding: 10px; max-height: 360px; overflow: auto;
  border-top: 1px solid var(--border); background: #111; color: var(--text);
  font: 0.72rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  white-space: pre-wrap; overflow-wrap: anywhere;
}
.detail-empty { padding: 9px 10px; color: var(--muted); border-top: 1px solid var(--border); }

/* ── Grid ── */
#library { padding: 24px; max-width: 1400px; margin: 0 auto; }
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 14px;
}
.card {
  background: var(--surface); border-radius: var(--radius); overflow: hidden;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .15s, box-shadow .15s, border-color .15s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.45); }
.card.active { border-color: var(--accent); }
.card-thumb {
  aspect-ratio: 16/9; background: var(--surface2);
  position: relative; overflow: hidden;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
.badges { position: absolute; bottom: 5px; right: 5px; display: flex; gap: 3px; }
.badge {
  font-size: 0.62rem; padding: 2px 5px; border-radius: 3px;
  background: rgba(0,0,0,.75); color: #fff; font-weight: 700;
}
.bv { background: rgba(62,166,255,.85); }
.ba { background: rgba(0,200,110,.85); }
.card-body { padding: 10px 12px 12px; }
.card-title {
  font-size: 0.83rem; font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 5px;
}
.card-meta { font-size: 0.73rem; color: var(--muted); }

/* ── States ── */
#status-msg {
  text-align: center; padding: 80px 20px; color: var(--muted); grid-column: 1/-1;
}
#load-more-wrap {
  grid-column: 1/-1; display: flex; justify-content: center; padding: 18px 0 6px;
}
#load-more-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 16px; border-radius: 6px; font-size: 0.86rem; cursor: pointer;
}
#load-more-btn:hover { border-color: var(--accent); }
#playback-msg {
  margin-top: 10px; color: var(--muted); font-size: 0.82rem; min-height: 1.2em;
}
.spinner {
  width: 34px; height: 34px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .65s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 680px) {
  .player-inner { grid-template-columns: 1fr; }
  .vlc-hint { display: none; }
}
@media (max-width: 480px) {
  header { padding: 10px 14px; }
  #library { padding: 14px; }
  #grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; }
}

/* ── Download bar ── */
#dl-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px 12px;
}
.dl-row {
  display: flex; gap: 8px; align-items: center;
  max-width: 1400px; margin: 0 auto;
}
#dl-input {
  flex: 1; max-width: 560px;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 7px 14px; border-radius: 6px; font-size: 0.88rem; outline: none;
  font-family: inherit;
}
#dl-input:focus { border-color: var(--accent); }
#dl-input::placeholder { color: var(--muted); }
#dl-btn {
  padding: 7px 18px; background: #2ea043; color: #fff; border: none;
  border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: opacity .15s; white-space: nowrap;
}
#dl-btn:hover { opacity: .85; }
#dl-btn:disabled { opacity: .4; cursor: default; }
#dl-queue {
  list-style: none; max-width: 1400px; margin: 8px auto 0;
  display: flex; flex-direction: column; gap: 5px;
}
#dl-queue:empty { display: none; }
.dl-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; padding: 5px 10px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  animation: fadein .2s ease;
}
@keyframes fadein { from { opacity: 0; transform: translateY(-4px); } }
.dl-item .di-icon { flex-shrink: 0; }
.dl-item .di-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
.dl-item .di-state { flex-shrink: 0; }
.dl-item .di-type { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; text-transform: uppercase; }
.dl-item .di-dismiss {
  flex-shrink: 0; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.9rem; padding: 0 2px; line-height: 1;
}
.dl-item .di-dismiss:hover { color: var(--text); }
.dl-item.dl-running { border-color: var(--accent); }
.dl-item.dl-done    { border-color: #2ea043; }
.dl-item.dl-failed  { border-color: #e05c5c; }
.dl-item.dl-error   { border-color: #e05c5c; }
.dl-spin {
  width: 12px; height: 12px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .65s linear infinite; flex-shrink: 0;
}
</style>
</head>
<body>

<header>
  <span class="logo">DIHI</span>
  <input id="search" type="search" placeholder="Search videos…" autocomplete="off" aria-label="Search">
  <div class="hcontrols">
    <button class="hbtn" id="play-all-btn" type="button" onclick="playAll()">▶ Play All</button>
    <a class="hbtn" href="/tags">Tags</a>
    <select id="sort" aria-label="Sort order">
      <option value="date-desc">Newest first</option>
      <option value="date-asc">Oldest first</option>
      <option value="title-asc">Title A–Z</option>
      <option value="title-desc">Title Z–A</option>
      <option value="channel">By channel</option>
    </select>
    <span id="count"></span>
  </div>
</header>

<div id="dl-bar">
  <div class="dl-row">
    <input id="dl-input" type="text"
           placeholder="YouTube URL, video ID, or playlist ID…"
           autocomplete="off" spellcheck="false" aria-label="YouTube URL or ID">
    <button id="dl-btn" onclick="submitDownload()">+ Add</button>
  </div>
  <ul id="dl-queue" aria-live="polite" aria-label="Download queue"></ul>
</div>

<div id="player-wrap" role="region" aria-label="Media player">
  <div class="player-inner">
    <div class="player-media">
      <video id="vpanel" controls preload="metadata" playsinline></video>
      <audio id="apanel" controls preload="metadata" hidden></audio>
      <div id="playback-msg" role="status" aria-live="polite"></div>
    </div>
    <div class="player-info">
      <div id="p-title"></div>
      <div class="p-meta" id="p-meta"></div>
      <div class="p-actions">
        <button class="btn btn-primary" id="btn-video" onclick="setMode('video')">▶ Video</button>
        <button class="btn btn-ghost"   id="btn-audio" onclick="setMode('audio')">♫ Audio only</button>
        <button class="btn btn-close"   onclick="closePlayer()">✕</button>
      </div>
      <div class="vlc-hint" id="vlc-hint" hidden>
        Open in VLC:<br>
        <code id="vlc-url"></code>
      </div>
      <div class="asset-details" id="asset-details"></div>
    </div>
  </div>
</div>

<main id="library">
  <div id="grid">
    <div id="status-msg"><div class="spinner"></div>Loading library…</div>
  </div>
</main>

<script>
'use strict';

const S = {
  videos: [],
  filtered: [],
  current: null,
  details: null,
  mode: 'video',
  playAll: false,
  renderLimit: 96,
};
const GRID_BATCH = 96;

const $ = id => document.getElementById(id);

// ── Library fetch ──────────────────────────────────────────────────────────

async function fetchLibrary() {
  try {
    const r = await fetch('/api/media/library');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    S.videos = data.videos || [];
  } catch (e) {
    $('grid').innerHTML = `<div id="status-msg">Failed to load library: ${esc(e.message)}</div>`;
    return;
  }
  applyFilters();
}

// ── Filter + sort ──────────────────────────────────────────────────────────

function applyFilters() {
  const q = $('search').value.trim().toLowerCase();
  const sort = $('sort').value;

  let list = S.videos;
  if (q) {
    list = list.filter(v =>
      v.title.toLowerCase().includes(q) ||
      v.channel_id.toLowerCase().includes(q) ||
      v.video_id.toLowerCase().includes(q)
    );
  }

  list = [...list].sort((a, b) => {
    switch (sort) {
      case 'date-desc': return (b.date || '').localeCompare(a.date || '');
      case 'date-asc':  return (a.date || '').localeCompare(b.date || '');
      case 'title-asc': return a.title.localeCompare(b.title);
      case 'title-desc':return b.title.localeCompare(a.title);
      case 'channel':
        return a.channel_id.localeCompare(b.channel_id) ||
               (b.date || '').localeCompare(a.date || '');
    }
    return 0;
  });

  S.filtered = list;
  S.renderLimit = GRID_BATCH;
  if (S.playAll && S.current && !list.some(v => v.video_id === S.current.video_id)) {
    S.playAll = false;
  }
  renderGrid();
  updatePlayAllButton();
}

// ── Grid render ────────────────────────────────────────────────────────────

function renderGrid() {
  const grid = $('grid');
  if (!S.filtered.length) {
    grid.innerHTML = '<div id="status-msg">No videos found.</div>';
    $('count').textContent = '';
    return;
  }

  const shown = Math.min(S.renderLimit, S.filtered.length);
  $('count').textContent = shown === S.filtered.length
    ? `${S.filtered.length} video${S.filtered.length !== 1 ? 's' : ''}`
    : `${shown} of ${S.filtered.length} videos`;

  const visible = S.filtered.slice(0, S.renderLimit);
  grid.innerHTML = visible.map(v => {
    const active = S.current && S.current.video_id === v.video_id ? ' active' : '';
    const thumb = v.files.thumbnail
      ? `<img src="${esc(v.files.thumbnail)}" alt="" loading="lazy" decoding="async" fetchpriority="low"
              onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-ph',textContent:'▶'}))">`
      : `<div class="thumb-ph">▶</div>`;
    const bv = v.files.video   ? '<span class="badge bv">MKV</span>' : '';
    const ba = v.files.audio   ? '<span class="badge ba">M4A</span>' : '';

    return `<div class="card${active}" data-id="${esc(v.video_id)}" role="button" tabindex="0"
              aria-label="${esc(v.title)}">
      <div class="card-thumb">${thumb}<div class="badges">${bv}${ba}</div></div>
      <div class="card-body">
        <div class="card-title">${esc(v.title)}</div>
        <div class="card-meta">${fmtDate(v.date)} · ${esc(v.channel_id)}</div>
      </div>
    </div>`;
  }).join('') + (S.renderLimit < S.filtered.length
    ? `<div id="load-more-wrap"><button id="load-more-btn" type="button">Load more</button></div>`
    : '');

  // Attach click + keyboard handlers
  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openVideo(el.dataset.id));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openVideo(el.dataset.id); }
    });
  });
  $('load-more-btn')?.addEventListener('click', loadMoreVideos);
}

function loadMoreVideos() {
  S.renderLimit += GRID_BATCH;
  renderGrid();
}

// ── Player ─────────────────────────────────────────────────────────────────

function openVideo(videoId) {
  const v = S.videos.find(x => x.video_id === videoId);
  if (!v) return;
  S.current = v;
  S.details = null;
  S.mode = v.files.video ? 'video' : 'audio';
  $('playback-msg').textContent = '';
  renderPlayer();
  loadDetails(v);
  $('player-wrap').classList.add('visible');
  $('player-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.card').forEach(el =>
    el.classList.toggle('active', el.dataset.id === videoId)
  );
}

function playableList() {
  return S.filtered.filter(v => v.files.video || v.files.audio);
}

function playAll() {
  const list = playableList();
  if (!list.length) return;
  S.playAll = true;
  updatePlayAllButton();
  const start = S.current && list.some(v => v.video_id === S.current.video_id)
    ? S.current
    : list[0];
  openVideo(start.video_id);
  playActiveMedia();
}

function stopPlayAll() {
  S.playAll = false;
  updatePlayAllButton();
}

function updatePlayAllButton() {
  const btn = $('play-all-btn');
  if (!btn) return;
  btn.classList.toggle('active', S.playAll);
  btn.textContent = S.playAll ? 'Playing All' : '▶ Play All';
  btn.disabled = !playableList().length;
}

function playActiveMedia() {
  const p = activePlayer();
  if (!p || p.hidden || !p.src) return;
  $('playback-msg').textContent = '';
  p.play().catch(e => {
    $('playback-msg').textContent = e?.message || 'Playback could not start.';
  });
}

function playNext() {
  if (!S.playAll || !S.current) return;
  const list = playableList();
  const idx = list.findIndex(v => v.video_id === S.current.video_id);
  const next = idx >= 0 ? list[idx + 1] : null;
  if (!next) {
    stopPlayAll();
    return;
  }
  openVideo(next.video_id);
  playActiveMedia();
}

function renderPlayer() {
  const v = S.current;
  if (!v) return;

  $('p-title').textContent = v.title;
  $('p-meta').innerHTML = [
    v.date   ? `📅 ${fmtDate(v.date)}` : '',
    `📁 ${esc(v.channel_id)}`,
    `🔗 ${esc(v.video_id)}`,
  ].filter(Boolean).join('<br>');

  const hasVid = !!v.files.video;
  const hasAud = !!v.files.audio;

  $('btn-video').hidden = !hasVid;
  $('btn-audio').hidden = !hasAud;
  $('btn-video').className = `btn ${S.mode === 'video' ? 'btn-primary' : 'btn-ghost'}`;
  $('btn-audio').className = `btn ${S.mode === 'audio' ? 'btn-primary' : 'btn-ghost'}`;

  const vp = $('vpanel');
  const ap = $('apanel');

  if (S.mode === 'video' && hasVid) {
    vp.hidden = false;
    ap.hidden = true;
    resetMedia(ap);
    // Rebuild video element to clear stale tracks
    vp.innerHTML = '';
    if (v.files.subtitles) {
      const tr = document.createElement('track');
      tr.kind = 'subtitles'; tr.src = v.files.subtitles;
      tr.label = 'English'; tr.default = true;
      vp.appendChild(tr);
    }
    vp.poster = v.files.thumbnail || '';
    if (vp.src !== location.origin + v.files.video) vp.src = v.files.video;
  } else if (hasAud) {
    ap.hidden = false;
    vp.hidden = true;
    resetMedia(vp);
    vp.poster = '';
    if (ap.src !== location.origin + v.files.audio) ap.src = v.files.audio;
  }

  // VLC hint – show the URL for the active media so users can copy it
  const mediaUrl = S.mode === 'video' ? v.files.video : v.files.audio;
  if (mediaUrl) {
    const absolute = location.origin + mediaUrl;
    $('vlc-url').textContent = absolute;
    $('vlc-hint').hidden = false;
  } else {
    $('vlc-hint').hidden = true;
  }

  renderAssetDetails();
}

function setMode(mode) {
  S.mode = mode;
  $('playback-msg').textContent = '';
  renderPlayer();
}

function closePlayer() {
  ['vpanel', 'apanel'].forEach(id => resetMedia($(id)));
  $('player-wrap').classList.remove('visible');
  S.current = null;
  S.details = null;
  S.playAll = false;
  updatePlayAllButton();
  $('asset-details').innerHTML = '';
  $('playback-msg').textContent = '';
  document.querySelectorAll('.card.active').forEach(el => el.classList.remove('active'));
}

async function loadDetails(video) {
  $('asset-details').innerHTML = '<div class="detail-empty">Loading details...</div>';
  try {
    const r = await fetch(`/api/media/details/${encodeURIComponent(video.channel_id)}/${encodeURIComponent(video.video_id)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const details = await r.json();
    if (!S.current || S.current.video_id !== video.video_id) return;
    S.details = details;
    renderAssetDetails();
  } catch (e) {
    if (S.current && S.current.video_id === video.video_id) {
      $('asset-details').innerHTML = `<div class="detail-empty">Failed to load details: ${esc(e.message)}</div>`;
    }
  }
}

function renderAssetDetails() {
  if (!S.current) return;
  const details = S.details;
  const files = details?.files || [];
  const metadata = details?.metadata || null;
  const fileRows = files.length
    ? files.map(f => `<div class="file-row">
        <span class="file-kind">${esc(f.kind || 'file')}</span>
        <span class="file-name"><a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.name)}</a></span>
        <span class="file-size">${fmtBytes(f.size)}</span>
      </div>`).join('')
    : '<div class="detail-empty">No files found.</div>';

  const historyRows = metadata ? renderMetadataRows(metadata) : '<div class="detail-empty">Metadata loading...</div>';
  const infoJson = metadata?.info_json
    ? esc(JSON.stringify(metadata.info_json, null, 2))
    : esc(metadata?.info_json_error || 'No .info.json metadata found.');

  $('asset-details').innerHTML = `
    <details open>
      <summary>Files (${files.length})</summary>
      <div class="file-list">${fileRows}</div>
    </details>
    <details open>
      <summary>Metadata</summary>
      <div class="meta-list">${historyRows}</div>
    </details>
    <details>
      <summary>info.json</summary>
      <pre class="metadata-json">${infoJson}</pre>
    </details>`;
}

function renderMetadataRows(metadata) {
  const rows = [];
  const addHistory = (label, values) => {
    if (!values?.length) return;
    for (const row of values) rows.push([label, `${row.timestamp} ${row.value}`]);
  };
  addHistory('channel_name', metadata.channel?.channel_name);
  addHistory('uploader_id', metadata.channel?.uploader_id);
  addHistory('uploader_name', metadata.channel?.uploader_name);
  addHistory('title_name', metadata.video?.title_name);
  addHistory('upload_date', metadata.video?.upload_date);

  const info = metadata.info_json || {};
  for (const key of ['id', 'title', 'channel', 'channel_id', 'uploader', 'uploader_id',
                     'upload_date', 'timestamp', 'duration', 'view_count', 'like_count',
                     'categories', 'tags', 'webpage_url']) {
    if (info[key] !== undefined && info[key] !== null && info[key] !== '') {
      rows.push([key, typeof info[key] === 'object' ? JSON.stringify(info[key]) : String(info[key])]);
    }
  }

  if (!rows.length) return '<div class="detail-empty">No metadata found.</div>';
  return rows.map(([k, v]) => `<div class="meta-row">
    <span class="meta-key">${esc(k)}</span>
    <span class="meta-val">${esc(v)}</span>
  </div>`).join('');
}

// ── Helpers ────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d || d.length !== 8) return d || '';
  return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
}

function fmtBytes(n) {
  const size = Number(n);
  if (!Number.isFinite(size)) return '';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let value = size;
  let i = 0;
  while (value >= 1024 && i < units.length - 1) {
    value /= 1024;
    i += 1;
  }
  return `${value.toFixed(i ? 1 : 0)} ${units[i]}`;
}

function activePlayer() {
  return $('vpanel').hidden ? $('apanel') : $('vpanel');
}

function resetMedia(el) {
  el.pause();
  el.removeAttribute('src');
  el.load();
}

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'Escape') { closePlayer(); return; }
  if (!S.current) return;
  const p = activePlayer();
  if (e.key === ' ')           { e.preventDefault(); p.paused ? playActiveMedia() : p.pause(); }
  if (e.key === 'ArrowRight')  { e.preventDefault(); p.currentTime += 10; }
  if (e.key === 'ArrowLeft')   { e.preventDefault(); p.currentTime -= 10; }
  if (e.key === 'ArrowUp')     { e.preventDefault(); p.volume = Math.min(1, p.volume + 0.1); }
  if (e.key === 'ArrowDown')   { e.preventDefault(); p.volume = Math.max(0, p.volume - 0.1); }
});

// ── Download bar ───────────────────────────────────────────────────────────

const VIDEO_ID_RE = /^[A-Za-z0-9_-]{11}$/;
// Active entries: id → {type, id, label, state, timerId}
const DL = new Map();

function parseYouTubeInput(raw) {
  const s = (raw || '').trim();
  if (!s) return null;

  // Try as URL (with or without scheme)
  let url = null;
  try { url = new URL(/^https?:\/\//i.test(s) ? s : 'https://' + s); } catch {}
  if (url) {
    const host = url.hostname.replace(/^www\./, '');
    if (host === 'youtube.com' || host === 'm.youtube.com') {
      const v    = url.searchParams.get('v');
      const list = url.searchParams.get('list');
      if (v && VIDEO_ID_RE.test(v)) return {type: 'video',    id: v};
      if (list)                      return {type: 'playlist', id: list};
    }
    if (host === 'youtu.be') {
      const v = url.pathname.slice(1).split('?')[0];
      if (VIDEO_ID_RE.test(v)) return {type: 'video', id: v};
    }
  }

  // Bare video ID (exactly 11 chars)
  if (VIDEO_ID_RE.test(s)) return {type: 'video', id: s};

  // Bare playlist ID (12+ alphanumeric chars — playlist IDs start with PL, RD, etc.)
  if (/^[A-Za-z0-9_-]{12,}$/.test(s)) return {type: 'playlist', id: s};

  return null;
}

const DL_ICONS  = {pending:'⏳', queued:'⏳', running:'', done:'✓', failed:'✗', error:'⚠'};
const DL_LABELS = {
  pending: 'submitting…', queued: 'queued',
  running: 'downloading…', done: 'done', failed: 'failed', error: 'error',
};

function renderDlItem(entry) {
  const li = document.createElement('li');
  li.id = `dl-${entry.id}`;
  li.className = `dl-item dl-${entry.state}`;
  const spinning = entry.state === 'running' || entry.state === 'pending';
  const iconHtml = spinning
    ? '<span class="dl-spin"></span>'
    : `<span class="di-icon">${DL_ICONS[entry.state] ?? '?'}</span>`;
  li.innerHTML = `
    ${iconHtml}
    <span class="di-label">${esc(entry.label)}</span>
    <span class="di-type">${esc(entry.type)}</span>
    <span class="di-state">${DL_LABELS[entry.state] ?? entry.state}</span>
    <button class="di-dismiss" title="Dismiss" data-id="${esc(entry.id)}">✕</button>`;
  li.querySelector('.di-dismiss').addEventListener('click', () => dismissDl(entry.id));
  return li;
}

function upsertDlItem(entry) {
  DL.set(entry.id, entry);
  const existing = document.getElementById(`dl-${entry.id}`);
  const newEl = renderDlItem(entry);
  if (existing) existing.replaceWith(newEl);
  else $('dl-queue').prepend(newEl);
}

function dismissDl(id) {
  const entry = DL.get(id);
  if (entry?.timerId) clearInterval(entry.timerId);
  DL.delete(id);
  document.getElementById(`dl-${id}`)?.remove();
}

async function submitDownload() {
  const input  = $('dl-input');
  const parsed = parseYouTubeInput(input.value);

  if (!parsed) {
    input.style.borderColor = '#e05c5c';
    input.focus();
    setTimeout(() => { input.style.borderColor = ''; }, 1500);
    return;
  }

  if (DL.has(parsed.id)) {
    document.getElementById(`dl-${parsed.id}`)?.scrollIntoView({block: 'nearest'});
    return;
  }

  const entry = {type: parsed.type, id: parsed.id,
                 label: parsed.type === 'playlist' ? `Playlist ${parsed.id}` : parsed.id,
                 state: 'pending', timerId: null};
  upsertDlItem(entry);
  input.value = '';
  $('dl-btn').disabled = true;

  try {
    const url = parsed.type === 'playlist'
      ? `/api/youtube/playlist/get/${encodeURIComponent(parsed.id)}`
      : `/api/youtube/get/${encodeURIComponent(parsed.id)}`;
    const r    = await fetch(url, {method: 'POST'});
    const data = await r.json();

    if (!r.ok || !data.ok) {
      entry.state = 'error';
      entry.label = data.error || `HTTP ${r.status}`;
      upsertDlItem(entry);
      return;
    }
    entry.state = 'queued';
    upsertDlItem(entry);
    parsed.type === 'playlist' ? startPollPlaylist(entry) : startPollVideo(entry);
  } catch (e) {
    entry.state = 'error';
    entry.label = e.message;
    upsertDlItem(entry);
  } finally {
    $('dl-btn').disabled = false;
  }
}

function startPollVideo(entry) {
  entry.state = 'running';
  upsertDlItem(entry);
  entry.timerId = setInterval(async () => {
    try {
      const r = await fetch(`/api/youtube/status/${encodeURIComponent(entry.id)}`);
      if (!r.ok) return;
      const data = await r.json();
      if (data.in_archive || data.result) {
        clearInterval(entry.timerId);
        entry.state = (data.result === 'completed' || data.in_archive) ? 'done' : 'failed';
        upsertDlItem(entry);
        if (entry.state === 'done') setTimeout(fetchLibrary, 1500);
      }
    } catch {}
  }, 3000);
}

function startPollPlaylist(entry) {
  entry.state = 'running';
  upsertDlItem(entry);
  entry.timerId = setInterval(async () => {
    try {
      const r = await fetch(`/api/youtube/playlist/status/${encodeURIComponent(entry.id)}`);
      if (!r.ok) return;
      const data = await r.json();
      if (data.result) {
        clearInterval(entry.timerId);
        entry.state = data.result === 'completed' ? 'done' : 'failed';
        upsertDlItem(entry);
        if (entry.state === 'done') setTimeout(fetchLibrary, 2000);
      }
    } catch {}
  }, 5000);
}

$('dl-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitDownload(); });

$('vpanel').addEventListener('click', e => {
  const vp = e.currentTarget;
  if (vp.hidden || !vp.src) return;
  if (vp.paused) playActiveMedia();
  else vp.pause();
});

$('vpanel').addEventListener('ended', playNext);
$('apanel').addEventListener('ended', playNext);
$('vpanel').addEventListener('error', () => {
  $('playback-msg').textContent = 'This video format may not be playable in the browser. Use the VLC URL below or try audio only.';
});
$('apanel').addEventListener('error', () => {
  $('playback-msg').textContent = 'This audio file could not be played in the browser.';
});

$('search').addEventListener('input', applyFilters);
$('sort').addEventListener('change', applyFilters);

fetchLibrary();
</script>
